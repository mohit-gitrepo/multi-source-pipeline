dbt_transforms:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', '') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'analytics_warehouse') }}"
      schema: staging
      threads: 1